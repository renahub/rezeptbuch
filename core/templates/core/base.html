<!-- core/templates/core/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rezeptbuch{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'core/css/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>

<body>
    <nav class="navbar navbar-expand-lg recipe-navbar">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'core:category_list' %}">
                <img src="{% static 'core/images/logo.png' %}" alt="Logo" class="navbar-logo-img">
                Mein Rezeptbuch
            </a>
            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                    aria-controls="navbarNav"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-3">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'core:category_list' %}">
                            <i class="bi bi-grid me-1"></i>Kategorien
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'core:recipe_list' %}">
                            <i class="bi bi-journal-text me-1"></i>Alle Rezepte
                        </a>
                    </li>
                </ul>

                <!-- Suchfeld -->
                <form class="d-flex ms-auto me-3 navbar-search" method="get" action="{% url 'core:recipe_search' %}">
                    <div class="input-group">
                        <input
                            class="form-control navbar-search-input"
                            type="search"
                            name="q"
                            placeholder="Rezept, Zutat, Kategorie …"
                            value="{{ request.GET.q|default:'' }}"
                            aria-label="Suche"
                        >
                        <button class="btn navbar-search-btn" type="submit">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>

                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-2">
                        <a class="btn btn-light" href="{% url 'core:recipe_create' %}">
                            <i class="bi bi-plus-lg me-1"></i>Neues Rezept
                        </a>
                    </li>
                </ul>

                <!-- base.html Navbar -->
                <a href="{% url 'core:shopping_cart' %}" class="nav-link">
                    🛒 Einkaufsliste
                    {% if cart_count > 0 %}
                        <span class="badge bg-warning text-dark">{{ cart_count }}</span>
                    {% endif %}
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        <!-- Inhalt der jeweiligen View -->
        {% endblock content %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
