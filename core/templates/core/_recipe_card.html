{% load static %}
<div class="col">
    <div class="card h-100 shadow-sm text-center position-relative">

        {% if show_edit %}
        <a href="{% url 'core:recipe_edit' recipe.pk %}"
           class="position-absolute top-0 end-0 m-2 btn btn-light btn-sm rounded-circle shadow-sm"
           style="z-index: 1;"
           title="Rezept bearbeiten">
            <i class="bi bi-pencil"></i>
        </a>
        {% endif %}

        <a href="{% url 'core:recipe' recipe.id %}" class="text-decoration-none text-dark">
            {% with recipe.images.all|first as img %}
            {% if img %}
                <img src="{{ img.image.url }}"
                     class="card-img-top img-fluid recipe-card-img"
                     alt="{{ recipe.name }}">
            {% else %}
                <img src="{% static 'core/images/placeholder.jpg' %}"
                     class="card-img-top img-fluid recipe-card-img"
                     alt="Kein Bild vorhanden">
            {% endif %}
            {% endwith %}
            <div class="card-body">
                <h5 class="card-title">{{ recipe.name }}</h5>
                <p class="card-text">
                    <strong>Zubereitungszeit:</strong> {{ recipe.preparation_length }} Min.
                </p>
            </div>
        </a>
    </div>
</div>
